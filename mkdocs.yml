site_name: Spectral
site_description: Turn any app into an API that AI agents can call
site_url: https://romain-gilliotte.github.io/spectral/
repo_url: https://github.com/romain-gilliotte/spectral
repo_name: romain-gilliotte/spectral

docs_dir: documentation

theme:
  name: material
  logo: assets/logo.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.highlight

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Capture:
      - Web applications: capture/web.md
      - Desktop and CLI apps: capture/desktop.md
      - Mobile apps: capture/mobile.md
  - Authentication:
      - Overview: authentication/index.md
      - Generated scripts: authentication/generated-scripts.md
      - Manual tokens: authentication/manual-tokens.md
  - Generation:
      - MCP Server: generation/mcp-tools.md
      - OpenAPI 3.0: generation/rest-output.md
      - GraphQL SDL: generation/graphql-output.md
  - Reference:
      - CLI reference: reference/cli.md
      - Debug mode: reference/debug-mode.md
      - Bundle format: bundle-format.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - toc:
      permalink: true
